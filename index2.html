<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nom de ta Playlist - GounetMusic</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #121212; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 400px; text-align: center; padding: 20px; background: #1e1e1e; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .cover { width: 200px; height: 200px; border-radius: 10px; margin-bottom: 20px; object-fit: cover; }
        h1 { font-size: 1.5rem; margin-bottom: 5px; }
        p { color: #b3b3b3; margin-bottom: 30px; }
        .link-card { background: #282828; display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; margin-bottom: 10px; border-radius: 8px; text-decoration: none; color: white; transition: 0.3s; }
        .link-card:hover { background: #3e3e3e; }
        .platform-name { font-weight: bold; }
        .btn-play { background: #1DB954; color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; text-transform: uppercase; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <img src="IMAGE_URL" alt="Cover" class="cover">
        <h1>Nom de ta Playlist</h1>
        <p>Écoutez sur votre plateforme préférée</p>

        <a href="URL_SPOTIFY" class="link-card">
            <span class="platform-name">Spotify</span>
            <span class="btn-play">Écouter</span>
        </a>
        <a href="URL_APPLE" class="link-card">
            <span class="platform-name">Apple Music</span>
            <span class="btn-play">Écouter</span>
        </a>
        <a href="URL_DEEZER" class="link-card">
            <span class="platform-name">Deezer</span>
            <span class="btn-play">Écouter</span>
        </a>
        <a href="URL_YOUTUBE" class="link-card">
            <span class="platform-name">YouTube</span>
            <span class="btn-play">Écouter</span>
        </a>
    </div>
</body>
</html>
