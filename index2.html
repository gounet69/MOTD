<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nom de la Playlist - GounetMusic</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --text-color: #ffffff;
            --subtext-color: #a0a0a0;
            --hover-bg: #2a2a2a;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }

        .container { 
            width: 90%; 
            max-width: 420px; 
            text-align: center; 
            padding: 30px 20px; 
        }

        .cover { 
            width: 180px; 
            height: 180px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            object-fit: cover;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }

        h1 { font-size: 1.6rem; margin-bottom: 8px; font-weight: 800; }
        p { color: var(--subtext-color); margin-bottom: 35px; font-size: 0.95rem; }

        .link-card { 
            background: var(--card-bg); 
            display: flex; 
            align-items: center; 
            padding: 14px 20px; 
            margin-bottom: 12px; 
            border-radius: 12px; 
            text-decoration: none; 
            color: white; 
            transition: all 0.2s ease-in-out;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .link-card:hover { 
            background: var(--hover-bg); 
            transform: translateY(-2px);
            border-color: rgba(255,255,255,0.15);
        }

        /* Style des logos */
        .platform-icon {
            width: 24px;
            height: 24px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .platform-icon img {
            width: 100%;
            height: auto;
        }

        .platform-name { 
            font-weight: 600; 
            flex-grow: 1; 
            text-align: left;
            font-size: 1rem;
        }

        .btn-play { 
            color: var(--subtext-color);
            font-size: 0.75rem; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            font-weight: 700; 
        }

        /* Couleurs spécifiques au survol pour le fun (Optionnel) */
        .spotify:hover { border-color: #1DB954; }
        .apple:hover { border-color: #FC3C44; }
        .deezer:hover { border-color: #EF5466; }
        .youtube:hover { border-color: #FF0000; }
        .amazon:hover { border-color: #00A8E1; }
    </style>
</head>
<body>
    <div class="container">
        <img src="URL_DE_TON_IMAGE" alt="Cover Playlist" class="cover">
        <h1>Nom de la Playlist</h1>
        <p>Disponible sur toutes les plateformes</p>

        <a href="URL_SPOTIFY" class="link-card spotify">
            <div class="platform-icon">
                <img src="https://cdn.simpleicons.org/spotify/1DB954" alt="Spotify">
            </div>
            <span class="platform-name">Spotify</span>
            <span class="btn-play">Écouter</span>
        </a>

        <a href="URL_YOUTUBE" class="link-card youtube">
            <div class="platform-icon">
                <img src="https://cdn.simpleicons.org/youtube/FF0000" alt="YouTube">
            </div>
            <span class="platform-name">YouTube</span>
            <span class="btn-play">Écouter</span>
        </a>
<a href="URL_APPLE" class="link-card apple">
    <div class="platform-icon">
        <img src="https://upload.wikimedia.org/wikipedia/commons/d/df/ITunes_logo.svg" alt="Apple Music">
    </div>
    <span class="platform-name">Apple Music</span>
    <span class="btn-play">Écouter</span>
</a>

<a href="[URL_AMAZON]" class="link-card">
            <div class="platform-icon"><img src="https://cloudinary-cdn.ffm.to/s--Qpi3CZYi--/w_64,h_64,c_limit/f_png/https%3A%2F%2Fassets.ffm.to%2Fimages%2Flogo%2Fmusic-service_amazon_without_text_new_branding.png" alt="Amazon Music"></div>
            <span class="platform-name">Amazon Music</span>
            <span class="btn-play">Écouter</span>
        </a>

<a href="URL_DEEZER" class="link-card deezer">
    <div class="platform-icon">
        <img src="https://cdn.simpleicons.org/deezer/EF5466" alt="Deezer">
    </div>
    <span class="platform-name">Deezer</span>
    <span class="btn-play">Écouter</span>
</a>
    </div>
</body>
</html>
