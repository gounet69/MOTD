<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[NOM_PLAYLIST] - GounetMusic</title>
    <style>
        /* Variables de couleurs de base */
        :root {
            --bg-overlay: rgba(15, 15, 15, 0.85); /* Surcouche sombre sur le flou pour le contraste */
            --card: rgba(26, 26, 26, 0.9);      /* Fond des boutons légèrement transparent */
            --text: #ffffff;
            --subtext: #a0a0a0;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #0f0f0f; /* Couleur de secours */
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            overflow-x: hidden; /* Évite les barres de défilement horizontales à cause du flou */
        }

        /* ----- L'effet de Fond Flouté ----- */
        .background-blur {
            position: fixed;   /* Reste fixe derrière le contenu qui défile */
            top: 0; left: 0;
            width: 100%; height: 100%;
            /* Injecte l'image 1000x1000 ici */
            background-image: url('https://cdn-images.dzcdn.net/images/cover/eddd8a5647dd76bd00cd620f0e69ffe1-f970e7ca583bc9b0cc2d663282c06b48-3b1a11e69d2e926810b0de27da8a9755-bc03050e859da9cb06ebae8c11f8a140/1000x1000-000000-80-0-0.jpg');
            background-size: cover;          /* Couvre tout l'écran */
            background-position: center;     /* Centre l'image */
            filter: blur(20px);              /* Force du flou (ajuste si besoin) */
            -webkit-filter: blur(20px);      /* Pour Safari */
            transform: scale(1.1);           /* Grandit légèrement l'image pour cacher les bords nets du flou */
            z-index: -2;                     /* Place tout derrière */
        }

        /* Surcouche sombre pour garantir la lisibilité du texte blanc */
        .background-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-overlay);
            z-index: -1;
        }

        /* ----- Le Contenu Principal ----- */
        .container { 
            width: 95%; max-width: 400px; 
            text-align: center; 
            padding: 40px 20px; 
            position: relative; /* Nécessaire pour le z-index */
            z-index: 1;         /* Passe devant le fond */
        }

        /* La cover principale au centre (reste nette) */
        .cover { 
            width: 180px; height: 180px; 
            border-radius: 12px; 
            margin-bottom: 25px; 
            object-fit: cover;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7); /* Ombre plus forte sur fond flou */
        }

        h1 { font-size: 1.6rem; margin-bottom: 35px; font-weight: 800; letter-spacing: -0.5px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

        /* Les boutons de liens */
        .link-card { 
            background: var(--card); 
            display: flex; 
            align-items: center; 
            padding: 14px 18px; 
            margin-bottom: 12px; 
            border-radius: 12px; 
            text-decoration: none; 
            color: white; 
            border: 1px solid rgba(255,255,255,0.06);
            transition: all 0.2s ease-in-out;
            backdrop-filter: blur(5px); /* Effet "verre dépoli" sur le bouton lui-même */
            -webkit-backdrop-filter: blur(5px);
        }

        .link-card:hover { background: rgba(40, 40, 40, 0.95); transform: translateY(-2px); border-color: rgba(255,255,255,0.15); }

        .platform-icon { 
            width: 32px; height: 32px; 
            margin-right: 15px; 
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            border-radius: 6px;
        }

        .platform-icon img { width: 100%; height: 100%; object-fit: contain; display: block; }

        .platform-name { flex-grow: 1; text-align: left; font-weight: 600; font-size: 1rem; }

        .btn-play { font-size: 0.7rem; color: var(--subtext); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        /* Style spécifique pour le fond blanc de l'icône Amazon */
        .amazon-icon-bg {
            background-color: #ffffff !important; /* Force le fond blanc */
            padding: 3px;               /* Espace pour le logo */
            box-sizing: border-box;     /* Gère correctement le padding */
            border-radius: 6px;         /* Même arrondi que les autres */
        }
    </style>
</head>
<body>
    <div class="background-blur"></div>
    <div class="background-overlay"></div>

    <div class="container">
        <img src="https://cdn-images.dzcdn.net/images/cover/eddd8a5647dd76bd00cd620f0e69ffe1-f970e7ca583bc9b0cc2d663282c06b48-3b1a11e69d2e926810b0de27da8a9755-bc03050e859da9cb06ebae8c11f8a140/1000x1000-000000-80-0-0.jpg" alt="Cover" class="cover">
        <h1>[NOM_PLAYLIST]</h1>

        <a href="[URL_SPOTIFY]" class="link-card">
            <div class="platform-icon"><img src="https://cdn.simpleicons.org/spotify/1DB954" alt="Spotify"></div>
            <span class="platform-name">Spotify</span>
            <span class="btn-play">Play</span>
        </a>

        <a href="[URL_APPLE]" class="link-card">
            <div class="platform-icon"><img src="https://upload.wikimedia.org/wikipedia/commons/d/df/ITunes_logo.svg" alt="Apple Music"></div>
            <span class="platform-name">Apple Music</span>
            <span class="btn-play">Play</span>
        </a>

        <a href="URL_DEEZER" class="link-card deezer">
            <div class="platform-icon">
                <img src="https://cdn.simpleicons.org/deezer/A238FF" alt="Deezer">
            </div>
            <span class="platform-name">Deezer</span>
            <span class="btn-play">Play</span>
        </a>

        <a href="[URL_AMAZON]" class="link-card">
            <div class="platform-icon amazon-icon-bg"><img src="https://cloudinary-cdn.ffm.to/s--Qpi3CZYi--/w_64,h_64,c_limit/f_png/https%3A%2F%2Fassets.ffm.to%2Fimages%2Flogo%2Fmusic-service_amazon_without_text_new_branding.png" alt="Amazon Music"></div>
            <span class="platform-name">Amazon Music</span>
            <span class="btn-play">Play</span>
        </a>

        <a href="[URL_YOUTUBE]" class="link-card">
            <div class="platform-icon"><img src="https://cdn.simpleicons.org/youtube/FF0000" alt="YouTube"></div>
            <span class="platform-name">YouTube</span>
            <span class="btn-play">Play</span>
        </a>
    </div>
</body>
</html>
